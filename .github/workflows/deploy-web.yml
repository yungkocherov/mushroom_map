# Production-деплой web на TimeWeb VM (Caddy раздаёт /srv/web).
#
# Тригер: push в main с изменениями в apps/web/** или packages/**.
# Cloudflare Pages выпилен 2026-04-29 (TSPU режет CF SNI из РФ → сайт
# не открывался без VPN). Теперь фронт живёт на той же VM, что и API.
#
# Что делает:
#   1. npm ci + vite build
#   2. rsync apps/web/dist/ → root@$PROD_HOST:/srv/web/  (с --delete)
#
# Caddy (на VM) автоматически подхватывает новые файлы — Vite кладёт
# хеши в имена ассетов, index.html короткоживущий (см. infra/Caddyfile).
#
# Требуемые secrets (Settings → Secrets → Actions):
#   PROD_HOST           — IP или hostname VM (как у deploy-api)
#   PROD_SSH_USER       — root для текущей TimeWeb VM
#   PROD_SSH_KEY        — приватный ключ (содержимое id_ed25519)
#
# Vars (Settings → Variables → Actions):
#   VITE_API_URL        — https://api.geobiom.ru
#   PROD_DEPLOY_ENABLED — 'true' чтобы реально пушить на VM

name: deploy-web

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: ${{ vars.PROD_DEPLOY_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: "20"
          cache: npm

      - name: Install workspace deps
        run: npm ci

      - name: Build web
        env:
          # VITE_TILES_URL не задаём — фронт fallback'ит на ${API_ORIGIN}/tiles
          # (см. apps/web/src/components/mapView/utils/api.ts). Тайлы раздаёт
          # Caddy на api-домене из /srv/mushroom-map/tiles.
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          # Observability envs запекаются в bundle при build'е. Если
          # переменные не заданы в GH Variables — SDK инициализируется в
          # no-op режиме (см. apps/web/src/main.tsx).
          VITE_SENTRY_DSN:       ${{ vars.VITE_SENTRY_DSN }}
          VITE_UMAMI_HOST:       ${{ vars.VITE_UMAMI_HOST }}
          VITE_UMAMI_WEBSITE_ID: ${{ vars.VITE_UMAMI_WEBSITE_ID }}
          VITE_GIT_SHA:          ${{ github.sha }}
        run: npm -w @mushroom-map/web run build

      - name: Rsync dist to VM
        uses: easingthemes/ssh-deploy@01a39e33483634cbd7ac99020c55b72ca7f098fe  # v5.0.3
        with:
          SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_KEY }}
          REMOTE_HOST:     ${{ secrets.PROD_HOST }}
          REMOTE_USER:     ${{ secrets.PROD_SSH_USER }}
          SOURCE:          "apps/web/dist/"
          TARGET:          "/srv/web/"
          # -a archive, -z compress, --delete вычищает удалённые файлы
          # (старые hash-ассеты, удалённые роуты). --chmod нормализует
          # права на 0644/0755 — иначе rsync переносит права с runner'а
          # (могут быть 0664 group-writable).
          ARGS: "-rlgoDz --delete --chmod=Du=rwx,Dgo=rx,Fu=rw,Fgo=r"
