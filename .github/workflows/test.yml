name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Unit-тесты geodata (formula parser и т.п.) — без БД, чисто Python.
  geodata-unit:
    name: geodata unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install geodata + dev deps
        working-directory: services/geodata
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run pytest
        working-directory: services/geodata
        run: pytest -v tests/

  # TypeScript typecheck + production build для веб-фронта.
  # Vitest не настроен — нет смысла гонять пустой test runner. Зато
  # `tsc --noEmit` ловит API-несоответствия + `vite build` падает на
  # ошибках импортов и неразрешённых ассетах.
  web-typecheck:
    name: web typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: TypeScript typecheck (web)
        working-directory: apps/web
        run: npx tsc --noEmit

      - name: Vite build (web)
        working-directory: apps/web
        run: npx vite build

  # API integration tests — поднимаем PostGIS sidecar'ом, применяем миграции,
  # запускаем uvicorn в фоне на 127.0.0.1:8000, гоняем pytest. Покрытие:
  # smoke (test_api_smoke.py) + auth-refresh + cabinet CRUD + oauth state.
  # Без этого джоба интеграционные тесты авто-скипались (DB unreachable).
  api-integration:
    name: api integration tests
    runs-on: ubuntu-latest
    services:
      db:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER:     mushroom
          POSTGRES_PASSWORD: mushroom_dev
          POSTGRES_DB:       mushroom_map
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mushroom -d mushroom_map"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      # CI host:port — не 5434, т.к. в GH Actions нет конфликта с
      # native Postgres (это прод-локалью был).
      DATABASE_URL: postgresql://mushroom:mushroom_dev@127.0.0.1:5432/mushroom_map
      TEST_DB_DSN:  postgresql://mushroom:mushroom_dev@127.0.0.1:5432/mushroom_map
      API_BASE:     http://127.0.0.1:8000
      JWT_SECRET:   change-me-in-production-a-long-random-string
      # Yandex creds оставляем пустыми — /yandex/login отдаст 503,
      # это покрыто smoke-тестом (он не проверяет happy-path).
      API_CORS_ORIGINS: http://localhost:5173
      TILES_DIR:    /tmp/tiles
      TERRAIN_DIR:  /tmp/terrain
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install api + test deps
        working-directory: services/api
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Apply DB migrations
        run: |
          mkdir -p /tmp/tiles /tmp/terrain
          python db/migrate.py

      - name: Start uvicorn in background
        working-directory: services/api
        run: |
          # PYTHONPATH=src чтобы запустить без e -e установки повторно.
          PYTHONPATH=src nohup uvicorn api.main:app --host 127.0.0.1 --port 8000 \
              > /tmp/uvicorn.log 2>&1 &
          # Ждём /health (uvicorn boot + DB pool init).
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null 2>&1; then
              echo "API up after ${i}s"
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:8000/health

      - name: Run pytest
        working-directory: services/api
        run: pytest -v tests/

      - name: Show uvicorn log on failure
        if: failure()
        run: tail -200 /tmp/uvicorn.log
