[pytest]
testpaths = services/api/tests services/geodata/tests
pythonpath = services/geodata/src services/api/src
# importlib mode — иначе одноимённые пакеты services/*/tests конфликтуют
# по имени `tests` при импорте.
addopts = --import-mode=importlib
filterwarnings =
    ignore::DeprecationWarning
