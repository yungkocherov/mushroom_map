<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#2d5a3a" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#171913" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Geobiom" />
    <title>Geobiom — лес ленобласти</title>
    <meta name="description" content="Грибная погода Ленобласти: индекс плодоношения по 18 районам, тип леса и микориза для каждого выдела, личные споты в кабинете. Открытая методология, данные Рослесхоза и Copernicus." />
    <link rel="canonical" href="https://geobiom.ru/" />

    <!-- Open Graph (Telegram / Facebook / LinkedIn / Slack / Discord). -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Geobiom" />
    <meta property="og:title" content="Geobiom — куда поехать за грибами" />
    <meta property="og:description" content="Грибная погода на завтра по 18 районам ЛО — индекс плодоношения, типы леса, личные споты. Открытые данные ФГИСЛК и Copernicus." />
    <meta property="og:url" content="https://geobiom.ru/" />
    <meta property="og:image" content="https://geobiom.ru/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="ru_RU" />

    <!-- Twitter / X использует свой формат и не рендерит SVG.
         Когда появится og-image.png — поменять src здесь, остальные
         платформы продолжат брать SVG из og:image выше. -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Geobiom — куда поехать за грибами" />
    <meta name="twitter:description" content="Грибная погода на завтра по 18 районам ЛО — индекс, типы леса, личные споты." />
    <meta name="twitter:image" content="https://geobiom.ru/og-image.svg" />
    <script>
      // Pre-hydrate theme: before React mounts, read the user's choice
      // from localStorage and set data-theme on <html>. Without this
      // the page flashes the system-scheme colours for one frame
      // before React re-applies the stored preference.
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (t === "light" || t === "dark") {
            document.documentElement.setAttribute("data-theme", t);
          }
        } catch (e) { /* private browsing / storage disabled */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
