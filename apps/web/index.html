<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#2d5a3a" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#171913" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Грибная карта" />
    <title>Грибная карта Ленобласти</title>
    <meta name="description" content="Интерактивная грибная карта Ленинградской области: тип леса, виды грибов, сезоны плодоношения, прогноз." />
    <script>
      // Pre-hydrate theme: before React mounts, read the user's choice
      // from localStorage and set data-theme on <html>. Without this
      // the page flashes the system-scheme colours for one frame
      // before React re-applies the stored preference.
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (t === "light" || t === "dark") {
            document.documentElement.setAttribute("data-theme", t);
          }
        } catch (e) { /* private browsing / storage disabled */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
